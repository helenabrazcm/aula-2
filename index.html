<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" id="mainContainer">
    <div id="sectionForm">
        <form class="form-cadastro" id="cadastroForm">
            <h2>Criar Conta</h2>
            <p>Preencha os dados abaixo para se cadastrar.</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
            </div>

            <button type="submit" class="btn-enviar">Cadastrar</button>
        </form>
    </div>

    <div id="sectionLista" class="lista-container" style="display: none;">
        <h3>Usuários Cadastrados</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                </tbody>
        </table>
        <button class="btn-enviar" onclick="voltarFormulario()" style="background-color: #6c757d; margin-top: 20px;">Cadastrar Novo</button>
    </div>
</div>
</body>
</html>
