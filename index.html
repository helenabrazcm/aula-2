<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
    <form class="form-cadastro" id="cadastroForm">
        <h2>Criar Conta</h2>
        <p>Preencha os dados abaixo para se cadastrar.</p>

        <div class="input-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
            </div>
        </div>

        <button type="submit" class="btn-enviar">Cadastrar</button>
    </form>

    <div class="lista-container" id="listaUsuarios" style="display: none;">
        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #eee;">
        <h3>Usuários Cadastrados</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                </tbody>
        </table>
    </div>
</div>

<script>
    const cpf = document.getElementById('cpf');
    const tel = document.getElementById('telefone');
    const form = document.getElementById('cadastroForm');
    const tabelaCorpo = document.getElementById('tabelaCorpo');
    const listaContainer = document.getElementById('listaUsuarios');

    // Máscaras (Seu código original mantido)
    cpf.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        e.target.value = v;
    });

    tel.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
        v = v.replace(/(\d{5})(\d)/, '$1-$2');
        e.target.value = v;
    });

    // Lógica para adicionar na lista
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;

        // Cria uma nova linha na tabela
        const novaLinha = `
            <tr>
                <td>${nome}</td>
                <td>${email}</td>
            </tr>
        `;

        tabelaCorpo.innerHTML += novaLinha;
        listaContainer.style.display = 'block';

        // Limpa o formulário
        form.reset();
    });
</script>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
            </div>

            <button type="submit" class="btn-enviar">Cadastrar</button>
        </form>
    </div>

    </script>

</body>
</html>
