<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>

    <div class="container" id="mainContainer">
        
        <div id="telaForm">
            <form id="cadastroForm">
                <h2>Criar Conta</h2>
                <p>Preencha os dados abaixo para se cadastrar.</p>

                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>

                    <div class="input-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                </div>

                <button type="submit" class="btn-enviar">Cadastrar</button>
            </form>
        </div>

        <div id="telaInfo" class="hidden">
            <h3>Usuários Cadastrados</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        </tbody>
                </table>
            </div>
            <button class="btn-enviar btn-voltar" onclick="irParaForm()">Cadastrar Novo</button>
        </div>

    </div>

    <script>
        // Seleção de elementos
        const form = document.getElementById('cadastroForm');
        const telaForm = document.getElementById('telaForm');
        const telaInfo = document.getElementById('telaInfo');
        const container = document.getElementById('mainContainer');
        const tabela = document.getElementById('tabelaCorpo');

        // Máscara CPF
        document.getElementById('cpf').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });

        // Máscara Telefone
        document.getElementById('telefone').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
            v = v.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = v;
        });

        // Lógica de Envio
        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Não deixa a página recarregar

            // Captura os dados
            const nome = document.getElementById('nome').value;
            const cpf = document.getElementById('cpf').value;
            const telefone = document.getElementById('telefone').value;

            // Adiciona na tabela
            const novaLinha = `
                <tr>
                    <td>${nome}</td>
                    <td>${cpf}</td>
                    <td>${telefone}</td>
                </tr>
            `;
            tabela.innerHTML += novaLinha;

            // Troca de "tela"
            telaForm.classList.add('hidden');
            telaInfo.classList.remove('hidden');
            container.classList.add('expandir');
        });

        // Função para voltar ao formulário
        function irParaForm() {
            form.reset(); // Limpa os campos
            telaForm.classList.remove('hidden');
            telaInfo.classList.add('hidden');
            container.classList.remove('expandir');
        }
    </script>

</body>
</html>
